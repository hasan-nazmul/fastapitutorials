<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastAPI Developer Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans min-h-screen">
    <header
      class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm"
    >
      <div
        class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between"
      >
        <div class="flex items-center space-x-3">
          <span class="text-2xl">⚡</span>
          <span
            class="text-xl font-bold tracking-tight bg-gradient-to-r from-teal-600 to-cyan-600 bg-clip-text text-transparent"
            >FastAPI Snippets</span
          >
        </div>
        <nav class="flex space-x-4">
          <a
            href="{{ url_for('home') }}"
            class="text-teal-600 font-medium px-3 py-2 rounded-md bg-teal-50"
            >Dashboard</a
          >
          <a
            href="/api/posts"
            target="_blank"
            class="text-gray-500 hover:text-gray-700 px-3 py-2 text-sm font-medium transition"
            >View Raw JSON</a
          >
        </nav>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
      {% block content %}
      {% endblock %}
    </main>
  </body>
</html>
