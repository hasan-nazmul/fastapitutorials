<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sample HTML</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 2rem;
			background: #f4f7fb;
			color: #1f2937;
		}
		.card {
			max-width: 600px;
			margin: 0 auto;
			background: #ffffff;
			padding: 2rem;
			border-radius: 12px;
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
		}
		h1 {
			margin-top: 0;
			color: #2563eb;
		}
		button {
			background: #2563eb;
			color: white;
			border: none;
			padding: 0.75rem 1rem;
			border-radius: 8px;
			cursor: pointer;
		}
		button:hover {
			background: #1d4ed8;
		}
	</style>
</head>
<body>
	<div class="card">
		<h1>Hello, World!</h1>
		<p>This is a simple sample HTML page.</p>
		<button onclick="alert('Button clicked!')">Click Me</button>
	</div>
</body>
</html>
